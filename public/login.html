<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CELESTIA TRADE PARTNERS LIMITED</title>
  <script src="/i18n.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      max-width: 1000px;
      width: 100%;
      display: flex;
      min-height: 600px;
    }
    
    .login-left {
      flex: 1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 60px 40px;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    
    .login-left::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: pulse 15s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .company-logo {
      font-size: 48px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }
    
    .company-name {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.3;
      position: relative;
      z-index: 1;
    }
    
    .company-tagline {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }
    
    .features {
      position: relative;
      z-index: 1;
    }
    
    .feature-item {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      opacity: 0.95;
    }
    
    .feature-icon {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 15px;
      font-size: 20px;
    }
    
    .feature-text {
      font-size: 15px;
    }
    
    .login-right {
      flex: 1;
      padding: 60px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .login-header {
      margin-bottom: 40px;
    }
    
    .login-title {
      font-size: 32px;
      font-weight: 700;
      color: #333;
      margin-bottom: 10px;
    }
    
    .login-subtitle {
      font-size: 14px;
      color: #666;
    }
    
    .form-group {
      margin-bottom: 25px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s;
      outline: none;
    }
    
    .form-input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    
    .remember-me {
      display: flex;
      align-items: center;
      font-size: 14px;
      color: #666;
    }
    
    .remember-me input {
      margin-right: 8px;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    
    .forgot-password {
      font-size: 14px;
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }
    
    .forgot-password:hover {
      color: #764ba2;
    }
    
    .login-button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }
    
    .login-button:active {
      transform: translateY(0);
    }
    
    .login-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      border-left: 4px solid #c33;
    }
    
    .error-message.show {
      display: block;
      animation: slideDown 0.3s ease-out;
    }
    
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .divider {
      text-align: center;
      margin: 30px 0;
      position: relative;
    }
    
    .divider::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: #e0e0e0;
    }
    
    .divider-text {
      background: white;
      padding: 0 15px;
      color: #999;
      font-size: 13px;
      position: relative;
      z-index: 1;
    }
    
    .test-accounts {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }
    
    .test-accounts-title {
      font-size: 13px;
      font-weight: 600;
      color: #666;
      margin-bottom: 12px;
    }
    
    .test-account {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: white;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .test-account:hover {
      background: #667eea;
      color: white;
      transform: translateX(5px);
    }
    
    .test-account:last-child {
      margin-bottom: 0;
    }
    
    .test-account-role {
      font-weight: 600;
    }
    
    .test-account-creds {
      color: #999;
      font-size: 11px;
    }
    
    .test-account:hover .test-account-creds {
      color: rgba(255, 255, 255, 0.8);
    }
    
    @media (max-width: 768px) {
      .login-container {
        flex-direction: column;
      }
      
      .login-left {
        padding: 40px 30px;
        min-height: 300px;
      }
      
      .company-name {
        font-size: 24px;
      }
      
      .login-right {
        padding: 40px 30px;
      }
      
      .login-title {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- 左侧品牌区域 -->
    <div class="login-left">
      <div class="company-logo">🏢</div>
      <h1 class="company-name" data-i18n="company.name">CELESTIA TRADE PARTNERS LIMITED</h1>
      <p class="company-tagline" data-i18n="company.tagline">专业的3C产品批发零售管理平台</p>
      
      <div class="features">
        <div class="feature-item">
          <div class="feature-icon">📦</div>
          <div class="feature-text" data-i18n="feature.inventory">智能库存管理</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">💰</div>
          <div class="feature-text" data-i18n="feature.sales">销售数据分析</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🔄</div>
          <div class="feature-text" data-i18n="feature.supply">供应链协同</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">📊</div>
          <div class="feature-text" data-i18n="feature.reports">实时报表统计</div>
        </div>
      </div>
    </div>
    
    <!-- 右侧登录表单 -->
    <div class="login-right">
      <div class="login-header">
        <h2 class="login-title" data-i18n="login.title">欢迎回来</h2>
        <p class="login-subtitle" data-i18n="login.subtitle">请登录您的账户以继续</p>
      </div>
      
      <div class="error-message" id="errorMessage"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username" data-i18n="login.username">用户名或邮箱</label>
          <input 
            type="text" 
            id="username" 
            class="form-input" 
            data-i18n-placeholder="login.username"
            placeholder="请输入用户名或邮箱"
            required
            autocomplete="username"
          >
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password" data-i18n="login.password">密码</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            data-i18n-placeholder="login.password"
            placeholder="请输入密码"
            required
            autocomplete="current-password"
          >
        </div>
        
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe">
            <span data-i18n="login.rememberMe">记住我</span>
          </label>
          <a href="#" class="forgot-password" data-i18n="login.forgotPassword">忘记密码？</a>
        </div>
        
        <button type="submit" class="login-button" id="loginButton" data-i18n="login.button">
          登录
        </button>
      </form>
      
      <div class="divider">
        <span class="divider-text" data-i18n="login.testAccounts">测试账号</span>
      </div>
      
      <div class="test-accounts">
        <div class="test-accounts-title" data-i18n="login.clickToLogin">点击快速登录</div>
        <div class="test-account" data-username="admin" data-password="admin123">
          <span class="test-account-role"><span data-i18n="role.admin">👑 管理员</span></span>
          <span class="test-account-creds">admin / admin123</span>
        </div>
        <div class="test-account" data-username="warehouse1" data-password="warehouse123">
          <span class="test-account-role"><span data-i18n="role.warehouse">📦 仓管员</span></span>
          <span class="test-account-creds">warehouse1 / warehouse123</span>
        </div>
        <div class="test-account" data-username="merchant_vip" data-password="merchant123">
          <span class="test-account-role"><span data-i18n="role.merchant.vip">💎 VIP商户</span></span>
          <span class="test-account-creds">merchant_vip / merchant123</span>
        </div>
        <div class="test-account" data-username="customer1" data-password="customer123">
          <span class="test-account-role"><span data-i18n="role.customer">🛒 零售客户</span></span>
          <span class="test-account-creds">customer1 / customer123</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    
    // 显示错误消息
    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
      
      setTimeout(() => {
        errorDiv.classList.remove('show');
      }, 5000);
    }
    
    // 登录处理
    async function handleLogin(username, password) {
      const loginButton = document.getElementById('loginButton');
      loginButton.disabled = true;
      loginButton.textContent = i18n.t('loading');
      
      try {
        // 这里暂时使用简单的验证逻辑
        // 实际应该调用后端API进行验证
        
        // 模拟API调用延迟
        await new Promise(resolve => setTimeout(resolve, 500));
        
        // 简单验证（实际应该调用后端）
        const validUsers = {
          'admin': 'admin123',
          'warehouse1': 'warehouse123',
          'merchant_vip': 'merchant123',
          'merchant_gold': 'merchant123',
          'customer1': 'customer123'
        };
        
        if (validUsers[username] === password) {
          // 登录成功
          localStorage.setItem('username', username);
          localStorage.setItem('loginTime', new Date().toISOString());
          
          // 根据用户角色跳转到不同页面
          if (username === 'admin' || username === 'warehouse1') {
            window.location.href = '/prototype.html';
          } else {
            window.location.href = '/inventory.html';
          }
        } else {
          showError(i18n.t('login.error.invalid'));
          loginButton.disabled = false;
          loginButton.textContent = i18n.t('login.button');
        }
      } catch (error) {
        showError(i18n.t('login.error.failed'));
        loginButton.disabled = false;
        loginButton.textContent = i18n.t('login.button');
      }
    }
    
    // 表单提交
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        showError(i18n.t('login.error.empty'));
        return;
      }
      
      await handleLogin(username, password);
    });
    
    // 测试账号快速登录
    document.querySelectorAll('.test-account').forEach(account => {
      account.addEventListener('click', async () => {
        const username = account.dataset.username;
        const password = account.dataset.password;
        
        document.getElementById('username').value = username;
        document.getElementById('password').value = password;
        
        await handleLogin(username, password);
      });
    });
    
    // 检查是否已登录
    window.addEventListener('DOMContentLoaded', () => {
      const username = localStorage.getItem('username');
      const loginTime = localStorage.getItem('loginTime');
      
      if (username && loginTime) {
        // 检查登录是否过期（7天）
        const loginDate = new Date(loginTime);
        const now = new Date();
        const daysDiff = (now - loginDate) / (1000 * 60 * 60 * 24);
        
        if (daysDiff < 7) {
          // 自动跳转
          window.location.href = '/prototype.html';
        }
      }
    });
  </script>
</body>
</html>
